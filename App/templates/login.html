{% extends 'base.html' %}
{% block title %}Login — WorkBoard{% endblock %}

{% block content %}
<div class="center-wrap">
  <div class="form-card">
    <h1>Welcome back</h1>
    <p class="form-subtitle">// authenticate to continue</p>

    <form method="post">
      {% csrf_token %}

      <div class="field">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" autocomplete="username" autofocus/>
      </div>

      <div class="field">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" autocomplete="current-password"/>
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">
        Sign in →
      </button>
    </form>

    <hr class="divider"/>
    <p style="font-size:12px;color:var(--muted);text-align:center;">
      No account yet? <a href="{% url 'register' %}" class="link">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
